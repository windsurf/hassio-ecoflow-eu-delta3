title: EcoFlow Delta 3
path: ecoflow
icon: mdi:battery-charging
type: sections
max_columns: 4
sections:
  - type: grid
    column_span: 1
    cards:
      - type: heading
        heading: Battery
      - type: gauge
        entity: sensor.ecoflow_delta_3_1500_battery_level
        name: Battery Level
        min: 0
        max: 100
        needle: true
        severity:
          green: 50
          yellow: 20
          red: 0
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_charge_cycles
        name: Cycles
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_state_of_health_bms_info
        name: State of Health (lifetime)
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_battery_temperature
        name: Battery Temperature
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_wifi_signal
        name: WiFi Signal
      # Optional: add your own custom gauges here (e.g. grid power usage sensors)
      # - type: gauge
      #   entity: sensor.your_power_usage_sensor
      #   min: -1500
      #   max: 3000
      #   needle: true
  - type: grid
    column_span: 1
    cards:
      - type: heading
        heading: Power
      - type: gauge
        entity: sensor.ecoflow_delta_3_1500_total_input_power
        name: Total In Power
        min: 0
        max: 2000
        needle: true
        severity:
          green: 500
          yellow: 100
          red: 0
      - type: gauge
        entity: sensor.ecoflow_delta_3_1500_total_output_power
        name: Total Out Power
        min: 0
        max: 2000
        needle: true
        severity:
          green: 0
          yellow: 1000
          red: 1800
  - type: grid
    column_span: 1
    cards:
      - type: heading
        heading: AC Output
      - type: tile
        entity: switch.ecoflow_delta_3_1500_ac_output
        name: AC Enabled
      - type: tile
        entity: switch.ecoflow_delta_3_1500_x_boost
        name: X-Boost
      - type: gauge
        entity: sensor.ecoflow_delta_3_1500_ac_output_power
        name: AC Out Power
        min: 0
        max: 1500
        needle: true
        severity:
          green: 0
          yellow: 1000
          red: 1400
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_ac_output_voltage
        name: AC Out Volts
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_ac_output_current
        name: AC Out Current
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_ac_output_frequency
        name: AC Out Frequency
  - type: grid
    column_span: 1
    cards:
      - type: heading
        heading: AC Input
      - type: tile
        entity: switch.ecoflow_delta_3_1500_ac_charging
        name: AC Charging (230V)
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_ac_plug_connected
        name: AC Plug Connected
      - type: gauge
        entity: sensor.ecoflow_delta_3_1500_ac_input_power
        name: AC In Power
        min: 0
        max: 1500
        needle: true
        severity:
          green: 500
          yellow: 100
          red: 0
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_ac_input_voltage
        name: AC In Volts
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_ac_input_current
        name: AC In Current
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_ac_input_frequency
        name: AC In Frequency
  - type: grid
    column_span: 1
    cards:
      - type: heading
        heading: Solar
      - type: gauge
        entity: sensor.ecoflow_delta_3_1500_solar_input_power
        name: Solar In Power
        min: 0
        max: 500
        needle: true
        severity:
          green: 300
          yellow: 100
          red: 0
      - type: tile
        entity: switch.ecoflow_delta_3_1500_pv_charge_priority
        name: Prio Solar Charging
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_solar_input_voltage
        name: Solar In Voltage
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_solar_input_current
        name: Solar In Current
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_mppt_output_power
        name: MPPT Output Power
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_mppt_temperature
        name: MPPT Temperature
  - type: grid
    column_span: 1
    cards:
      - type: heading
        heading: DC Outputs
      - type: tile
        entity: switch.ecoflow_delta_3_1500_usb_output
        name: DC (12V) Enabled
      - type: tile
        entity: switch.ecoflow_delta_3_1500_dc_output
        name: DC (24V) Enabled
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_dc_12v_output_power
        name: DC (12V) Out Power
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_mppt_dc_converter_power
        name: DC-DC 12V Power
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_dc_12v_input_power
        name: Car Charger Input Power
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_dc_12v_temperature
        name: DC (12V) Temperature
  - type: grid
    column_span: 1
    cards:
      - type: heading
        heading: USB Outputs
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_usb_a_1_power
        name: USB-A 1 Power
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_usb_a_2_power
        name: USB-A 2 Power
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_usb_a_qc_1_power
        name: USB-A QC 1 Power
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_usb_a_qc_2_power
        name: USB-A QC 2 Power
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_usb_c_1_power
        name: USB-C 1 Power
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_usb_c_2_power
        name: USB-C 2 Power
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_usb_c_1_temperature
        name: USB-C 1 Temperature
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_usb_c_2_temperature
        name: USB-C 2 Temperature
      - type: tile
        # entity: sensor.ecoflow_delta_3_1500_wireless_charging_power  # removed in v0.2.9
        name: Wireless Charging Power
  - type: grid
    column_span: 1
    cards:
      - type: heading
        heading: Settings
      - type: tile
        entity: number.ecoflow_delta_3_1500_max_charge_level
        name: Max Charge Level
      - type: tile
        entity: number.ecoflow_delta_3_1500_min_discharge_level
        name: Min Discharge Level
      - type: tile
        entity: number.ecoflow_delta_3_1500_battery_protection_soc
        name: Battery Protection SOC
      - type: tile
        entity: number.ecoflow_delta_3_1500_ac_charging_speed
        name: AC Charging Power
      - type: tile
        entity: number.ecoflow_delta_3_1500_min_soc_for_ac_auto_on
        name: Min SOC for AC Auto-On
      - type: tile
        entity: switch.ecoflow_delta_3_1500_ac_auto_on
        name: AC Auto On
      - type: tile
        entity: switch.ecoflow_delta_3_1500_ac_always_on
        name: AC Always On
      - type: tile
        entity: switch.ecoflow_delta_3_1500_ups_mode
        name: UPS Mode
      - type: tile
        entity: number.ecoflow_delta_3_1500_device_standby_time
        name: Unit Timeout
      - type: tile
        entity: number.ecoflow_delta_3_1500_ac_output_standby_time
        name: AC Timeout
      - type: tile
        entity: number.ecoflow_delta_3_1500_dc_12v_standby_time
        name: DC (12V) Timeout
      - type: tile
        entity: number.ecoflow_delta_3_1500_lcd_brightness

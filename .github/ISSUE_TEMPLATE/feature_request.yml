name: Feature Request
description: Suggest an idea or new device support
labels: ["enhancement"]
body:
  - type: input
    id: device
    attributes:
      label: Device model (if relevant)
      placeholder: "Delta 3 Plus / River 3 / ..."
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
    validations:
      required: true

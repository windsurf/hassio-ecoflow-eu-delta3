name: Bug Report
description: File a bug report
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: "Delta 3 1500 (D361...)"
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2024.12.0"
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "0.1.2"
    validations:
      required: true
  - type: input
    id: auth_mode
    attributes:
      label: Auth mode
      placeholder: "App Login / Developer API / Auto"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Enable debug logging first (see README)
      render: shell
